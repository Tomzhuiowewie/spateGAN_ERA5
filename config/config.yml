# spateGAN-ERA5 Downscaling Configuration
# Configuration for ERA5 precipitation downscaling from lat-lon to UTM projection
# currently downscaling of a time sequence at a fixed domain is supported

# ============================================================================
# Data Paths
# ============================================================================
data:
  # Input netCDF ERA5 data (lat-lon projection, typically from Copernicus)
  input_path: # define path to input netCDF file here, e.g., "data/era5_input.nc"
  # Unit of precipitation values in the input file. Examples: 'm', 'm/s', 'm/hr', 'mm/hr'
  precip_unit: 'm'

  # Output paths
  output_utm_path: null #"output/utm/"      # High-res output in UTM projection if null no utm output saved
  output_latlon_path: null  # High-res output reprojected to lat-lon if null no lat-lon output saved
  save_model_input: true  # Save the model input data along with predictions to defined output_(latlon,utm)_path
  
  # Model weights
  model_weights_path: "model_weights/model_weights.pt"
  # Patches spanning across multiple UTM zones lead to projection issues and NaNs.
  nan_fill_threshold: 0.02  # Fraction of NaNs in patch above which no filling is done (e.g., 0.01 = 1%)
  
# ============================================================================
# Domain Configuration
# ============================================================================
domain:
  # Downscaling domain of center coordinates. Domain size: +- 168 km from center
  center_lat: 20 # Center latitude for patch extraction (90:-90)
  center_lon: -40   # Center longitude for patch extraction (-180:180)

# ============================================================================
# Time Configuration
# ============================================================================
time:
  # Date range for data extraction (format: 'YYYY-MM-DD')
  # If null, the entire dataset is processed
  start_date: null  # e.g., '2010-01-01T06:00:00.000000000'
  end_date: null    # e.g., '2010-01-05T06:00:00.000000000'
  

# ============================================================================
# Projection Configuration
# ============================================================================
projection:
  # UTM projection settings
  utm_zone: null  # Auto-detect if null, else specify as integer (e.g., 32)
  
  # Extra padding for slicing (cells)
  # Data is sliced slightly larger than needed to ensure coverage
  extra_padding_cells: 2


# ============================================================================
# Inference / sliding window
# ============================================================================
inference:
  # Sliding stride in hours for moving the input window (default 1 hour)
  stride_hours: 8 # 1-8 hours, smaller = more continous predictions, can also be used for probabilistic downscaling

  # Apply final ERA5 constraint to correct deviations due to striding strategy
  final_era_constraint: true  

# ============================================================================
# Processing Configuration
# ============================================================================
processing:
  # Device: 'cuda' or 'cpu'
  device: 'cuda'
  
  # Seed for reproducibility and probabilistic downscaling
  # Fixed seed for long time series can lead to local extreme values
  # Use varying seed (-1) for variability of local extremes
  seed: 10

# ============================================================================
# Plotting Configuration
# ============================================================================
plotting:
  # enable plotting precipitation sum maps
  precipitation_sums: true


