# Standalone training config for reproducing the paper training process.
# This does not affect config/config.yml or the existing inference pipeline.

x_path: "data/training_data"
y_path: "data/training_data"
x_pattern: "x_train*.nc"
y_pattern: "y_train*.nc"
y_variable: "sample_high_res"
x_target_shape: [16, 28, 28]
y_target_shape: [48, 168, 168]

# 可选: "gan"、"cnn" 或 "pg_erd"
training_method: "pg_erd"

output_dir: "training_reproduction/checkpoints"

batch_size: 1
max_steps: 30000
checkpoint_interval: 1000

validation_x_path: "data/validation_data"
validation_y_path: "data/validation_data"
validation_x_pattern: "x_val*.nc"
validation_y_pattern: "y_val*.nc"
# 多卡训练时不要太频繁验证，否则验证和画图会抵消加速。
validation_interval: 2000
validation_interval_epochs: 1
validation_batch_size: 2
validation_max_batches: null
save_visualizations: false
visualization_vmin: 0.01
visualization_vmax: 20.0
# Notebook-compatible plot: fixed validation patch, hour and dropout seed.
visualization_sample_index: 0
visualization_timestep: 12
visualization_seed: 4

device: "cuda"
seed: 42
num_workers: 4
load_into_memory: false
dataset_cache_size: 16
train_fraction: 0.1
subset_seed: 42

generator_lr: 0.0001
discriminator_lr: 0.0002
l1_weight: 1.0
ensemble_size: 3

base_channels: 32
diffusion_steps: 1000
sampling_steps: 5
base_weight: 1.0
uncertainty_weight: 0.1
diffusion_weight: 1.0
recon_weight: 0.1
mass_weight: 0.05
pde_weight: 0.01
smooth_weight: 0.005
wet_threshold: 0.1
